name: CI
permissions: {}

on:
  pull_request:
    branches:
      - main

jobs:
  chart-testing:
    name: Chart Testing
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.list-changed.outputs.changed }}
      changed_list: ${{ steps.list-changed.outputs.changed_list }}
      values_files_json: ${{ steps.list-changed.outputs.values_files_json }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          # renovate: github=helm/helm
          version: v4.2.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
        with:
          # renovate: github=helm/chart-testing
          version: v3.14.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed="$(ct list-changed --config .github/linters/ct.yaml)"
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "changed_list=\"${changed//$'\n'/ }\"" >> "$GITHUB_OUTPUT"
          fi

      - name: install helm unittest plugin
        if: steps.list-changed.outputs.changed == 'true'
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --version 1.0.3 --verify=false

      - name: Run chart-testing (lint)
        run: ct lint --config .github/linters/ct.yaml

      - name: Generate text matrix
        if: steps.list-changed.outputs.changed == 'true'
        id: list-changed
        #language=bash
        run: |
          set -euo pipefail
          # get changed charts (one per line)
          changed=$(ct list-changed --config .github/linters/ct.yaml)

          # normalize and count changed charts
          changed_trimmed=$(echo "$changed" | sed '/^\s*$/d')
          num_changed=$(echo "$changed_trimmed" | sed '/^\s*$/d' | wc -l | tr -d ' ')

          if [[ -z "$changed_trimmed" ]]; then
            # nothing changed
            {
              echo "changed=false"
              echo "changed_list="
              echo "values_files_json=[]"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$num_changed" -gt 1 ]; then
            echo "More than one chart changed (count=$num_changed). Failing."
            echo "$changed_trimmed"
            exit 1
          fi

          # single chart changed: compute ci/*-values.yaml files for that chart
          chart_path=$(echo "$changed_trimmed" | head -n1 | tr -d '"')
          # extract chart name (basename)
          chart_name=$(basename "$chart_path")

          values_json="[]"
          # look for ci/*-values.yaml under the chart directory
          # enable nullglob so the glob expands to empty array when no match
          shopt -s nullglob
          files=(charts/"$chart_name"/ci/*-values.yaml)
          if [ ${#files[@]} -gt 0 ]; then
            values_json="["
            sep=""
            for f in "${files[@]}"; do
              # ensure we only include files
              if [ -f "$f" ]; then
                # make path relative to workspace root
                relpath="$f"
                values_json+="$sep\"$relpath\""
                sep=","
              fi
            done
            values_json+="]"
          fi
          shopt -u nullglob

          {
            echo "changed=true"
            echo "changed_list=\"$chart_path\""
            echo "values_files_json=$values_json"
          } >> "$GITHUB_OUTPUT"


  integration-tests:
    name: diff
    needs: chart-testing
    runs-on: ubuntu-latest
    if: needs.generate-jobs.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        valuefile: ${{ fromJson(needs.generate-jobs.outputs.values_files_json) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          # renovate: github=helm/helm
          version: v4.2.0

      - name: install helm diff plugin
        run: helm plugin install https://github.com/databus23/helm-diff --version 3.15.4 --verify=false

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Checkout Target of PR
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: target
          ref: ${{ github.event.pull_request.base.ref }}
          persist-credentials: false

      - name: Apply Gateway API CRDs
        run: kubectl apply -k https://github.com/kubernetes-sigs/gateway-api/config/crd

      - name: Apply KEDA CRDs
        run: kubectl apply --server-side -f "https://github.com/kedacore/keda/releases/download/v${KEDA_VERSION}/keda-${KEDA_VERSION}-crds.yaml"
        env:
          #renovate: github=kedacore/keda
          KEDA_VERSION: 2.20.0

      - name: Setup chart dependencies
        id: setup
        env:
          value_file: "${{ matrix.valuefile }}"
        run: |
          set -euo pipefail
          IFS=$'\n\t'

          echo "Running diff for value file: $value_file"
          # extract chart name from path like charts/<chart>/ci/<file>
          # dirname twice: charts/<chart>/ci -> charts/<chart>, basename -> <chart>
          chart="$(basename "$(dirname "$(dirname "$value_file")")")"

          helm dependency update "./target/charts/$chart"
          helm dependency update "./charts/$chart"

          echo chart="$chart" >> "$GITHUB_OUTPUT"

      - name: Run helm install from main branch
        id: install
        env:
          chart: "${{ steps.setup.outputs.chart }}"
          value_file: "${{ matrix.valuefile }}"
        # language=bash
        run: |
          # install current target chart into cluster so helm diff has a baseline
          helm upgrade -i "$chart" "./target/charts/$chart" \
            --create-namespace \
            --namespace "$chart" \
            --wait \
            --values "$value_file"

      - name: Debug failed installation
        if: failure() && steps.install.outcome == 'failure'
        env:
          chart: "${{ steps.setup.outputs.chart }}"
        # language=bash
        run: |
          echo "::group::kubectl get ns"
          kubectl get ns --show-labels
          echo "::endgroup::"
          echo "::group::kubectl get events"
          kubectl get events --namespace "$chart"
          echo "::endgroup::"
          echo "::group::kubectl get deploy,ds,sts"
          kubectl get deploy,ds,sts --namespace "$chart"
          echo "::endgroup::"
          echo "::group::kubectl get pods"
          kubectl get pods --namespace "$chart" -o wide
          echo "::endgroup::"
          for pod in $(kubectl get pods --namespace "$chart" -o jsonpath='{.items[*].metadata.name}'); do
            echo "::group::pods/$pod"
            kubectl describe --namespace "$chart" "pods/$pod"
            kubectl logs --namespace "$chart" "$pod" --tail 30
            echo "::endgroup::"
          done

      - name: Run helm diff
        env:
          chart: "${{ steps.setup.outputs.chart }}"
          value_file: "${{ matrix.valuefile }}"
        #language=bash
        run: |
          set -euo pipefail
          IFS=$'\n\t'

          {
            printf '```diff\n'
            helm diff upgrade "$chart" "./charts/$chart" \
              --namespace "$chart" \
              --suppress=CustomResourceDefinition \
              --normalize-manifests \
              --reset-values \
              --no-color \
              -C 5 \
              --suppress-output-line-regex="helm.sh/chart:" \
              --suppress-output-line-regex="chart:" \
              --suppress-output-line-regex="app.kubernetes.io/version:" \
              --values "$value_file" | tee /dev/stderr
            printf '\n```'
          } > "$GITHUB_STEP_SUMMARY"


      - name: Run helm install from main branch
        id: upgrade
        env:
          chart: "${{ steps.setup.outputs.chart }}"
          value_file: "${{ matrix.valuefile }}"
        # language=bash
        run: |
          helm upgrade -i "$chart" "./charts/$chart" \
            --create-namespace \
            --namespace "$chart" \
            --wait \
            --values "$value_file"

      - name: Debug failed upgrade
        if: failure() && steps.upgrade.outcome == 'failure'
        # language=bash
        run: |
          echo "::group::kubectl get ns"
          kubectl get ns --show-labels
          echo "::endgroup::"
          echo "::group::kubectl get events"
          kubectl get events --namespace "$chart"
          echo "::endgroup::"
          echo "::group::kubectl get deploy,ds,sts"
          kubectl get deploy,ds,sts --namespace "$chart"
          echo "::endgroup::"
          echo "::group::kubectl get pods"
          kubectl get pods --namespace "$chart" -o wide
          echo "::endgroup::"
          for pod in $(kubectl get pods --namespace "$chart" -o jsonpath='{.items[*].metadata.name}'); do
            echo "::group::pods/$pod"
            kubectl describe --namespace "$chart" "pods/$pod"
            kubectl logs --namespace "$chart" "$pod" --tail 30
            echo "::endgroup::"
          done

      - name: setup chainsaw
        uses: kyverno/action-install-chainsaw@v0.1.0
        with:
          # renovate: github=kyverno/chainsaw
          release: v0.1.0 # optional

      - name: Run chainsaw
        env:
          chart: "${{ steps.setup.outputs.chart }}"
          value_file: "${{ matrix.valuefile }}"
        run: |-
          chainsaw test --fail-fast false -n "$chart" "charts/$chart/test/integration/" --set valueFile="$value_file"
        working-directory: "charts/${{ steps.setup.outputs.chart }}"

  check-generated-files:
    name: Check Generated Files
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: generate CODEOWNERS
        run: |
          ./scripts/generate-codeowners.sh | tee .github/CODEOWNERS

      - name: check CODEOWNERS for modifications
        run: |
          git diff --exit-code

      - name: generate MAINTAINERS.md
        run: |
          ./scripts/generate-maintainers.sh | tee MAINTAINERS.md

      - name: check MAINTAINERS.md for modifications
        run: |
          git diff --exit-code

      - name: generate advanced-issue-labeler.yml
        run: |
          ./scripts/generate-labeler.sh | tee .github/advanced-issue-labeler.yml

      - name: check advanced-issue-labeler.yml for modifications
        run: |
          git diff --exit-code

      - name: check issue template chart dropdowns
        run: |
          EXPECTED=$(find charts/ -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)
          for template in .github/ISSUE_TEMPLATE/*.yml; do
            ACTUAL=$(yq -r '.body[] | select(.id == "chart-name") | .attributes.options[]' "$template" 2>/dev/null | sort)
            if [[ -z "$ACTUAL" ]]; then
              continue
            fi
            if [[ "$EXPECTED" != "$ACTUAL" ]]; then
              echo "ERROR: Chart dropdown in $template is out of sync with charts/ directory." >&2
              diff <(echo "$EXPECTED") <(echo "$ACTUAL")
              exit 1
            fi
          done

  super-linter:
    name: Super Linter
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: 'false'

      - name: Lint Code Base
        uses: super-linter/super-linter/slim@9e863354e3ff62e0727d37183162c4a88873df41 # v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MULTI_STATUS: false
          LINTER_RULES_PATH: .github/linters
          GITHUB_ACTIONS_ZIZMOR_CONFIG_FILE: ../../../github/workspace/.github/linters/zizmor.yml
          ENABLE_GITHUB_ACTIONS_STEP_SUMMARY: true
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: false
          SAVE_SUPER_LINTER_SUMMARY: true
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_BASH: true
          VALIDATE_BASH_EXEC: true
          VALIDATE_EDITORCONFIG: true
          VALIDATE_ENV: true
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: true
          VALIDATE_GITLEAKS: true
          VALIDATE_HTML: true
          VALIDATE_JSON: true
          VALIDATE_NATURAL_LANGUAGE: true
          # VALIDATE_MARKDOWN: true - disable to for now.
          VALIDATE_RENOVATE: true
          VALIDATE_SHELL_SHFMT: true
          VALIDATE_SPELL_CODESPELL: true
          # VALIDATE_XML: true
          # VALIDATE_YAML: true
  renovate-auto-merge:
    name: Auto-approve PRs from Renovate
    runs-on: ubuntu-24.04
    environment: renovate-auto-merge
    needs:
      - chart-testing
      - check-generated-files
      - super-linter
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository
      && contains(github.event.pull_request.labels.*.name, 'dependencies/auto-merge')
      && (github.event.pull_request.user.login  == 'renovate[bot]' || github.event.pull_request.user.login  == 'helm-charts-renovate-helper-app[bot]')
    steps:
      # Using a GitHub App token, because GitHub Actions doesn't run on commits from github-actions bot
      # Used App:
      # https://github.com/organizations/prometheus-community/settings/apps/helm-charts-renovate-helper.
      # Ref: https://github.com/prometheus-community/helm-charts/issues/5213.
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_RENOVATE_HELPER_APP_ID }}
          private-key: ${{ secrets.APP_RENOVATE_HELPER_PRIVATE_KEY }}

      - name: Approve PR
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve --repo "${{ github.repository }}"
          gh pr merge ${{ github.event.pull_request.number }} --admin --squash --repo "${{ github.repository }}" --match-head-commit "${{ github.event.pull_request.head.sha }}" --delete-branch
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
