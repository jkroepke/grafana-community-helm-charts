# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: service ipFamilyPolicy and ipFamilies
templates:
  - ingester/service.yaml
  - gateway/service.yaml
  - monolithic/service.yaml
  - config.yaml

set:
  loki.useTestSchema: true
  loki.storage.bucketNames.chunks: chunks
  loki.storage.bucketNames.ruler: ruler
  loki.storage.bucketNames.admin: admin

tests:
  - it: does not set ipFamilyPolicy by default on non-headless ingester service
    set:
      deploymentMode: Distributed
      ingester.replicas: 1
    asserts:
      - notExists:
          path: spec.ipFamilyPolicy
        documentIndex: 0
        template: ingester/service.yaml

  - it: does not set ipFamilies by default on non-headless ingester service
    set:
      deploymentMode: Distributed
      ingester.replicas: 1
    asserts:
      - notExists:
          path: spec.ipFamilies
        documentIndex: 0
        template: ingester/service.yaml

  - it: does not set ipFamilyPolicy on headless ingester service
    set:
      deploymentMode: Distributed
      ingester.replicas: 1
      ingester.service.ipFamilyPolicy: PreferDualStack
    asserts:
      - notExists:
          path: spec.ipFamilyPolicy
        documentIndex: 1
        template: ingester/service.yaml

  - it: sets ipFamilyPolicy on non-headless ingester service via component value
    set:
      deploymentMode: Distributed
      ingester.replicas: 1
      ingester.service.ipFamilyPolicy: PreferDualStack
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
        documentIndex: 0
        template: ingester/service.yaml

  - it: sets ipFamilies on non-headless ingester service via component value
    set:
      deploymentMode: Distributed
      ingester.replicas: 1
      ingester.service.ipFamilies[0]: IPv6
    asserts:
      - equal:
          path: spec.ipFamilies[0]
          value: IPv6
        documentIndex: 0
        template: ingester/service.yaml

  - it: sets ipFamilyPolicy on all non-headless services via defaults.service
    set:
      deploymentMode: Distributed
      ingester.replicas: 1
      defaults.service.ipFamilyPolicy: RequireDualStack
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: RequireDualStack
        documentIndex: 0
        template: ingester/service.yaml

  - it: component ipFamilyPolicy overrides defaults.service.ipFamilyPolicy
    set:
      deploymentMode: Distributed
      ingester.replicas: 1
      defaults.service.ipFamilyPolicy: RequireDualStack
      ingester.service.ipFamilyPolicy: PreferDualStack
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
        documentIndex: 0
        template: ingester/service.yaml

  - it: does not set ipFamilyPolicy on gateway service by default
    set:
      deploymentMode: SingleBinary
      singleBinary.replicas: 1
    asserts:
      - notExists:
          path: spec.ipFamilyPolicy
        template: gateway/service.yaml

  - it: sets ipFamilyPolicy on gateway service via component value
    set:
      deploymentMode: SingleBinary
      singleBinary.replicas: 1
      gateway.service.ipFamilyPolicy: PreferDualStack
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
        template: gateway/service.yaml

  - it: sets ipFamilies on gateway service via component value
    set:
      deploymentMode: SingleBinary
      singleBinary.replicas: 1
      gateway.service.ipFamilies[0]: IPv6
    asserts:
      - equal:
          path: spec.ipFamilies[0]
          value: IPv6
        template: gateway/service.yaml

  - it: sets ipFamilyPolicy on gateway service via defaults.service
    set:
      deploymentMode: SingleBinary
      singleBinary.replicas: 1
      defaults.service.ipFamilyPolicy: RequireDualStack
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: RequireDualStack
        template: gateway/service.yaml

  - it: gateway ipFamilyPolicy overrides defaults.service.ipFamilyPolicy
    set:
      deploymentMode: SingleBinary
      singleBinary.replicas: 1
      defaults.service.ipFamilyPolicy: RequireDualStack
      gateway.service.ipFamilyPolicy: PreferDualStack
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
        template: gateway/service.yaml

  - it: sets ipFamilyPolicy on monolithic service via component value
    set:
      deploymentMode: SingleBinary
      singleBinary.replicas: 1
      singleBinary.service.ipFamilyPolicy: PreferDualStack
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
        documentIndex: 0
        template: monolithic/service.yaml

  - it: does not set ipFamilyPolicy on headless monolithic service
    set:
      deploymentMode: SingleBinary
      singleBinary.replicas: 1
      singleBinary.service.ipFamilyPolicy: PreferDualStack
    asserts:
      - notExists:
          path: spec.ipFamilyPolicy
        documentIndex: 1
        template: monolithic/service.yaml
