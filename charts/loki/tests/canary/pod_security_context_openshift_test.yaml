# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: canary pod security context (OpenShift)
templates:
  - loki-canary/daemonset.yaml
  - config.yaml

capabilities:
  apiVersions:
    - security.openshift.io/v1

set:
  deploymentMode: Distributed
  loki.useTestSchema: true
  lokiCanary.image.tag: 0.0.0
  loki.storage.bucketNames.chunks: chunks
  loki.storage.bucketNames.ruler: ruler
  loki.storage.bucketNames.admin: admin

tests:
  - it: retains runAsUser when OpenShift is detected but forceRunAsUser=false
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 10001
        template: loki-canary/daemonset.yaml

  - it: omits runAsUser when OpenShift is detected and forceRunAsUser=true
    set:
      openshift.forceRunAsUser: true
    asserts:
      - notExists:
          path: spec.template.spec.securityContext.runAsUser
        template: loki-canary/daemonset.yaml

  - it: omits fsGroup when OpenShift is detected and forceRunAsUser=true
    set:
      openshift.forceRunAsUser: true
    asserts:
      - notExists:
          path: spec.template.spec.securityContext.fsGroup
        template: loki-canary/daemonset.yaml

  - it: omits runAsGroup when OpenShift is detected and forceRunAsUser=true
    set:
      openshift.forceRunAsUser: true
    asserts:
      - notExists:
          path: spec.template.spec.securityContext.runAsGroup
        template: loki-canary/daemonset.yaml

  - it: retains runAsNonRoot when OpenShift is detected and forceRunAsUser=true
    set:
      openshift.forceRunAsUser: true
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
        template: loki-canary/daemonset.yaml
