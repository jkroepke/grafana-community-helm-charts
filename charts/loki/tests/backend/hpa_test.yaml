# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: backend hpa
templates:
  - backend/hpa.yaml

tests:
  - it: should create a backend HPA with correct names in simple-scalable mode
    set:
      deploymentMode: SimpleScalable
      loki.commonConfig.replication_factor: 1
      loki.useTestSchema: true
      backend.autoscaling.enabled: true
      backend.autoscaling.minReplicas: 3
      backend.autoscaling.maxReplicas: 6
      backend.autoscaling.targetCPUUtilizationPercentage: 60
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: metadata.name
          value: RELEASE-NAME-loki-backend
      - equal:
          path: spec.scaleTargetRef.kind
          value: StatefulSet
      - equal:
          path: spec.scaleTargetRef.name
          value: loki-backend
      - equal:
          path: spec.minReplicas
          value: 3
      - equal:
          path: spec.maxReplicas
          value: 6

  - it: should not render backend HPA when autoscaling is disabled
    set:
      deploymentMode: SimpleScalable
      loki.commonConfig.replication_factor: 1
      loki.useTestSchema: true
      backend.autoscaling.enabled: false
    asserts:
      - hasDocuments:
          count: 0
