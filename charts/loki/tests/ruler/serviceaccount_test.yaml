# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: ruler service account
templates:
  - ruler/workload.yaml
  - ruler/serviceaccount.yaml
  - config.yaml

set:
  deploymentMode: Distributed
  loki.useTestSchema: true
  loki.storage.bucketNames.chunks: chunks
  loki.storage.bucketNames.ruler: ruler
  loki.storage.bucketNames.admin: admin

tests:
  - it: uses global service account name by default
    asserts:
      - template: ruler/workload.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-loki
      - template: ruler/serviceaccount.yaml
        hasDocuments:
          count: 0

  - it: uses ruler generated service account name when ruler account is created
    set:
      ruler.serviceAccount.create: true
    asserts:
      - template: ruler/workload.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-loki-ruler
      - template: ruler/serviceaccount.yaml
        equal:
          path: metadata.name
          value: RELEASE-NAME-loki-ruler

  - it: uses ruler serviceAccount.name override
    set:
      ruler.serviceAccount.create: false
      ruler.serviceAccount.name: ruler-custom-sa
      serviceAccount.name: global-custom-sa
    asserts:
      - template: ruler/workload.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: ruler-custom-sa

  - it: creates ruler ServiceAccount with ruler serviceAccount.name override
    set:
      ruler.serviceAccount.create: true
      ruler.serviceAccount.name: ruler-custom-sa
    asserts:
      - template: ruler/workload.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: ruler-custom-sa
      - template: ruler/serviceaccount.yaml
        equal:
          path: metadata.name
          value: ruler-custom-sa

  - it: sets ruler ServiceAccount automountServiceAccountToken when creating ruler account
    set:
      ruler.serviceAccount.create: true
      ruler.serviceAccount.automountServiceAccountToken: false
    asserts:
      - template: ruler/serviceaccount.yaml
        equal:
          path: automountServiceAccountToken
          value: false

  - it: sets ruler pod automountServiceAccountToken when ruler value is explicitly true
    set:
      ruler.automountServiceAccountToken: true
    asserts:
      - template: ruler/workload.yaml
        equal:
          path: spec.template.spec.automountServiceAccountToken
          value: true

  - it: sets ruler pod automountServiceAccountToken when ruler value is explicitly false
    set:
      ruler.automountServiceAccountToken: false
    asserts:
      - template: ruler/workload.yaml
        equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
