# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: ruler rbac
templates:
  - ruler/rbac.yaml

set:
  deploymentMode: Distributed
  loki.useTestSchema: true
  loki.storage.bucketNames.chunks: chunks
  loki.storage.bucketNames.ruler: ruler
  loki.storage.bucketNames.admin: admin
  ruler.sidecar: true

tests:
  - it: does not render when deploymentMode is not Distributed
    set:
      deploymentMode: Monolithic
      ruler.sidecar: true
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render when ruler.sidecar=false
    set:
      ruler.sidecar: false
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render when ruler.enabled=false
    set:
      ruler.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders ClusterRole and ClusterRoleBinding when Distributed with ruler.sidecar=true
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: ClusterRole
        documentIndex: 0
      - isKind:
          of: ClusterRoleBinding
        documentIndex: 1

  - it: does not render when rbac.enabled=false
    set:
      rbac.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render when sidecar.rules.enabled=false
    set:
      sidecar.rules.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: ClusterRole has correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-loki-ruler
        documentIndex: 0

  - it: ClusterRoleBinding references correct ClusterRole
    asserts:
      - equal:
          path: roleRef.name
          value: RELEASE-NAME-loki-ruler
        documentIndex: 1
      - equal:
          path: roleRef.kind
          value: ClusterRole
        documentIndex: 1

  - it: renders Role and RoleBinding when namespaced=true
    set:
      rbac.namespaced: true
    asserts:
      - isKind:
          of: Role
        documentIndex: 0
      - isKind:
          of: RoleBinding
        documentIndex: 1
      - equal:
          path: roleRef.kind
          value: Role
        documentIndex: 1

  - it: subject uses global service account by default
    asserts:
      - equal:
          path: subjects[0].name
          value: RELEASE-NAME-loki
        documentIndex: 1

  - it: subject uses ruler service account when ruler.serviceAccount.create=true
    set:
      ruler.serviceAccount.create: true
    asserts:
      - equal:
          path: subjects[0].name
          value: RELEASE-NAME-loki-ruler
        documentIndex: 1

  - it: subject uses custom serviceAccount.name when ruler serviceAccount is created
    set:
      ruler.serviceAccount.create: true
      ruler.serviceAccount.name: ruler-custom-sa
    asserts:
      - equal:
          path: subjects[0].name
          value: ruler-custom-sa
        documentIndex: 1
