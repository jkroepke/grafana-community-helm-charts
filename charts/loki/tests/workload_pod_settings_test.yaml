      - equal: *tolerationsAssert
        template: read/workload.yaml
      - equal: *resourcesAssert
        template: backend/workload.yaml
      - equal: *dnsAssert
        template: backend/workload.yaml
      - equal: *affinityAssert
        template: backend/workload.yaml
      - equal: *nodeSelectorAssert
        template: backend/workload.yaml
