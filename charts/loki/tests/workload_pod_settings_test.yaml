# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: workload pod settings
templates:
  - monolithic/workload.yaml
  - read/workload.yaml
  - write/workload.yaml
  - backend/workload.yaml
  - ingester/workload.yaml
  - distributor/workload.yaml
  - querier/workload.yaml
  - query-frontend/workload.yaml
  - query-scheduler/workload.yaml
  - index-gateway/workload.yaml
  - compactor/workload.yaml
  - bloom-gateway/statefulset.yaml
  - bloom-planner/statefulset.yaml
  - bloom-builder/workload.yaml
  - pattern-ingester/workload.yaml
  - ruler/workload.yaml
  - overrides-exporter/workload.yaml
  - gateway/deployment.yaml
  - gateway/configmap.yaml
  - loki-canary/daemonset.yaml
  - table-manager/deployment.yaml
  - results-cache/statefulset.yaml
  - chunks-cache/statefulset.yaml
  - config.yaml

set:
  loki.useTestSchema: true
  loki.storage.bucketNames.chunks: chunks
  loki.storage.bucketNames.ruler: ruler
  loki.storage.bucketNames.admin: admin

tests:
  - it: should render pod settings for the monolithic component
    set:
      deploymentMode: Monolithic
      singleBinary.replicas: 1
      singleBinary.persistence.enabled: false
      singleBinary.resources: &resources
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
      singleBinary.dnsConfig: &dnsConfig
        options:
          - name: ndots
            value: "2"
      singleBinary.affinity: &affinity
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - zone-a
      singleBinary.nodeSelector: &nodeSelector
        disktype: ssd
      singleBinary.tolerations: &tolerations
        - key: dedicated
          operator: Equal
          value: logs
          effect: NoSchedule
    asserts:
      - equal: &resourcesAssert
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
        template: monolithic/workload.yaml
      - equal: &dnsAssert
          path: spec.template.spec.dnsConfig.options[0].name
          value: ndots
        template: monolithic/workload.yaml
      - equal: &affinityAssert
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].values[0]
          value: zone-a
        template: monolithic/workload.yaml
      - equal: &nodeSelectorAssert
          path: spec.template.spec.nodeSelector.disktype
          value: ssd
        template: monolithic/workload.yaml
      - equal: &tolerationsAssert
          path: spec.template.spec.tolerations[0].value
          value: logs
        template: monolithic/workload.yaml

  - it: should render pod settings for simple scalable components
    set:
      deploymentMode: SimpleScalable
      read.legacyReadTarget: false
      write.resources: *resources
      write.dnsConfig: *dnsConfig
      write.affinity: *affinity
      write.nodeSelector: *nodeSelector
      write.tolerations: *tolerations
      read.resources: *resources
      read.dnsConfig: *dnsConfig
      read.affinity: *affinity
      read.nodeSelector: *nodeSelector
      read.tolerations: *tolerations
      backend.resources: *resources
      backend.dnsConfig: *dnsConfig
      backend.affinity: *affinity
      backend.nodeSelector: *nodeSelector
      backend.tolerations: *tolerations
    asserts:
      - equal: *resourcesAssert
