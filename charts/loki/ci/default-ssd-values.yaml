---
loki:
  commonConfig:
    replication_factor: 1
  useTestSchema: true
  storage:
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin

deploymentMode: SimpleScalable

ignoreMinioDeprecation: true
minio:
  enabled: true

read:
  replicas: 1
write:
  replicas: 1
backend:
  replicas: 1

sidecar:
  rules:
    enabled: true
