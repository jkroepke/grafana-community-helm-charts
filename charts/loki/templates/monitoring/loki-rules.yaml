{{- if and .Values.monitoring.rules.enabled .Values.monitoring.rules.additionalGroups }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    {{- include "loki.labels" $ | nindent 4 }}
    {{- with .Values.monitoring.rules.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.monitoring.rules.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  name: {{ include "loki.fullname" $ }}-loki-rules-additional
  namespace: {{ .Values.monitoring.rules.namespace | default (include "loki.namespace" $) }}
spec:
  groups:
    {{- range .Values.monitoring.rules.additionalGroups }}
    - name: {{ .name }}
      rules:
        {{- toYaml .rules | nindent 8 }}
    {{- end }}
{{- end }}
