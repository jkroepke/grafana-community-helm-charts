{{- if and .Values.monitoring.rules.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ printf "%s-%s" (include "loki.fullname" .) "loki-rules" | trunc 63 | trimSuffix "-" }}
  namespace: {{ .Values.monitoring.rules.namespace | default (include "loki.namespace" $) }}
  labels:
    {{- include "loki.labels" $ | nindent 4 }}
    {{- with .Values.monitoring.rules.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.monitoring.rules.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  groups:
  - name: loki_rules
    rules:
    - expr: histogram_quantile(0.99, sum(rate(loki_request_duration_seconds_bucket[1m])) by ({{ range $.Values.monitoring.rules.additionalAggregationLabels }}{{ . }},{{ end }}le, cluster, job))
      record: cluster_job:loki_request_duration_seconds:99quantile
      labels:
        cluster: "{{ include "loki.clusterLabel" $ }}"
        {{- with .Values.monitoring.rules.additionalRuleLabels }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
    - expr: histogram_quantile(0.50, sum(rate(loki_request_duration_seconds_bucket[1m])) by ({{ range $.Values.monitoring.rules.additionalAggregationLabels }}{{ . }},{{ end }}le, cluster, job))
      record: cluster_job:loki_request_duration_seconds:50quantile
