{{- if .Values.tests.integration.enabled }}
{{- $dict := dict "ctx" . "component" "integration-tests" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tempo.resourceName" $dict }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tempo.labels" $dict | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  {{- range $path, $content := .Files.Glob "tests/integration/*.bats" }}
  {{ base $path }}: |
    {{- $content | toString | nindent 4 }}
  {{- end }}
{{- end }}
