# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: compactor HorizontalPodAutoscaler
templates:
  - lib/hpa.tpl
  - compactor/hpa.yaml

tests:
  - it: HPA is not rendered by default (autoscaling disabled)
    template: compactor/hpa.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: HPA is not rendered when autoscaling.enabled but hpa.enabled is false
    template: compactor/hpa.yaml
    set:
      compactor.autoscaling.enabled: true
      compactor.autoscaling.hpa.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: HPA is rendered when autoscaling and hpa enabled, with autoscaling/v2 shape
    template: compactor/hpa.yaml
    set:
      compactor.autoscaling.enabled: true
      compactor.autoscaling.hpa.enabled: true
      compactor.autoscaling.hpa.targetCPUUtilizationPercentage: 60
      compactor.autoscaling.hpa.targetMemoryUtilizationPercentage: 70
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: apiVersion
          value: autoscaling/v2
      - equal:
          path: kind
          value: HorizontalPodAutoscaler
      - equal:
          path: metadata.name
          value: RELEASE-NAME-tempo-compactor
      - equal:
          path: spec.scaleTargetRef
          value:
            apiVersion: apps/v1
            kind: Deployment
            name: RELEASE-NAME-tempo-compactor
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 60
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: memory
              target:
                type: Utilization
                averageUtilization: 70
      - notContains:
          path: spec.metrics
          content:
            targetAverageUtilization: 60

  - it: HPA renders CPU metric from hpa.targetCPUUtilizationPercentage
    template: compactor/hpa.yaml
    set:
      compactor.autoscaling.enabled: true
      compactor.autoscaling.hpa.enabled: true
      compactor.autoscaling.hpa.targetCPUUtilizationPercentage: 80
    asserts:
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 80

  - it: HPA renders memory metric from hpa.targetMemoryUtilizationPercentage
    template: compactor/hpa.yaml
    set:
      compactor.autoscaling.enabled: true
      compactor.autoscaling.hpa.enabled: true
      compactor.autoscaling.hpa.targetCPUUtilizationPercentage: null
      compactor.autoscaling.hpa.targetMemoryUtilizationPercentage: 75
    asserts:
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: memory
              target:
                type: Utilization
                averageUtilization: 75

  - it: HPA renders both CPU and memory metrics
    template: compactor/hpa.yaml
    set:
      compactor.autoscaling.enabled: true
      compactor.autoscaling.hpa.enabled: true
      compactor.autoscaling.hpa.targetCPUUtilizationPercentage: 80
      compactor.autoscaling.hpa.targetMemoryUtilizationPercentage: 75
    asserts:
      - lengthEqual:
          path: spec.metrics
          count: 2

  - it: HPA renders min/max replicas
    template: compactor/hpa.yaml
    set:
      compactor.autoscaling.enabled: true
      compactor.autoscaling.hpa.enabled: true
      compactor.autoscaling.minReplicas: 2
      compactor.autoscaling.maxReplicas: 10
    asserts:
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 10

  - it: HPA renders behavior block when set
    template: compactor/hpa.yaml
    set:
      compactor.autoscaling.enabled: true
      compactor.autoscaling.hpa.enabled: true
      compactor.autoscaling.hpa.behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
    asserts:
      - equal:
          path: spec.behavior.scaleDown.stabilizationWindowSeconds
          value: 300

  - it: HPA does not render behavior block when empty
    template: compactor/hpa.yaml
    set:
      compactor.autoscaling.enabled: true
      compactor.autoscaling.hpa.enabled: true
      compactor.autoscaling.hpa.behavior: {}
    asserts:
      - notExists:
          path: spec.behavior

  - it: HPA is not rendered when backendScheduler is enabled
    template: compactor/hpa.yaml
    set:
      compactor.autoscaling.enabled: true
      compactor.autoscaling.hpa.enabled: true
      backendScheduler.enabled: true
    asserts:
      - hasDocuments:
          count: 0
