# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: compactor Deployment
templates:
  - lib/workload.tpl
  - compactor/deployment-compactor.yaml
  - configmap-tempo.yaml

tests:
  - it: renders a Deployment with correct name and kind
    template: compactor/deployment-compactor.yaml
    asserts:
      - equal:
          path: kind
          value: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-tempo-compactor

  - it: renders standard ports on the compactor container
    template: compactor/deployment-compactor.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 7946
            name: http-memberlist
            protocol: TCP
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 3200
            name: http-metrics
            protocol: TCP

  - it: does not render trace ports (compactor has no trace ingestion)
    template: compactor/deployment-compactor.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports
          value:
            - containerPort: 7946
              name: http-memberlist
              protocol: TCP
            - containerPort: 3200
              name: http-metrics
              protocol: TCP

  - it: renders user-defined compactor.extraPorts
    template: compactor/deployment-compactor.yaml
    set:
      compactor.extraPorts:
        - containerPort: 9999
          name: custom-port
          protocol: TCP
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 9999
            name: custom-port
            protocol: TCP

  - it: uses tempo.podSecurityContext when no component override is set
    template: compactor/deployment-compactor.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1000

  - it: component podSecurityContext overrides tempo.podSecurityContext
    template: compactor/deployment-compactor.yaml
    set:
      compactor.podSecurityContext:
        fsGroup: 2000
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 2000

  - it: defaults.podSecurityContext is used when neither component nor tempo override is set
    template: compactor/deployment-compactor.yaml
    set:
      tempo.podSecurityContext: null
      defaults.podSecurityContext:
        fsGroup: 3000
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 3000

  - it: uses tempo.securityContext for container securityContext by default
    template: compactor/deployment-compactor.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1000

  - it: component containerSecurityContext overrides tempo.securityContext
    template: compactor/deployment-compactor.yaml
    set:
      compactor.containerSecurityContext:
        runAsUser: 2000
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 2000

  - it: defaults.nodeSelector is applied when component has no nodeSelector
    template: compactor/deployment-compactor.yaml
    set:
      defaults.nodeSelector:
        kubernetes.io/os: linux
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            kubernetes.io/os: linux

  - it: component nodeSelector overrides defaults.nodeSelector
    template: compactor/deployment-compactor.yaml
    set:
      defaults.nodeSelector:
        kubernetes.io/os: linux
      compactor.nodeSelector:
        kubernetes.io/arch: amd64
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            kubernetes.io/arch: amd64

  - it: defaults.tolerations are applied when component has no tolerations
    template: compactor/deployment-compactor.yaml
    set:
      defaults.tolerations:
        - key: dedicated
          operator: Equal
          value: tempo
          effect: NoSchedule
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: dedicated
            operator: Equal
            value: tempo
            effect: NoSchedule

  - it: defaults.resources are used when neither component nor tempo resources are set
    template: compactor/deployment-compactor.yaml
    set:
      defaults.resources.limits.memory: 256Mi
      defaults.resources.requests.cpu: 100m
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m

  - it: component resources override defaults.resources
    template: compactor/deployment-compactor.yaml
    set:
      defaults.resources.limits.memory: 256Mi
      compactor.resources.limits.memory: 512Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 512Mi

  - it: defaults.podAnnotations are applied to pod
    template: compactor/deployment-compactor.yaml
    set:
      defaults.podAnnotations:
        team: platform
    asserts:
      - equal:
          path: spec.template.metadata.annotations["team"]
          value: platform

  - it: component podAnnotations override defaults.podAnnotations
    template: compactor/deployment-compactor.yaml
    set:
      defaults.podAnnotations:
        env: default
      compactor.podAnnotations:
        env: production
    asserts:
      - equal:
          path: spec.template.metadata.annotations["env"]
          value: production

  - it: global.priorityClassName is used when no component override
    template: compactor/deployment-compactor.yaml
    set:
      global.priorityClassName: high-priority
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: high-priority

  - it: defaults.priorityClassName overrides global.priorityClassName
    template: compactor/deployment-compactor.yaml
    set:
      global.priorityClassName: high-priority
      defaults.priorityClassName: medium-priority
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: medium-priority

  - it: component priorityClassName overrides defaults and global
    template: compactor/deployment-compactor.yaml
    set:
      global.priorityClassName: high-priority
      defaults.priorityClassName: medium-priority
      compactor.priorityClassName: low-priority
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: low-priority

  - it: global.extraArgs are prepended to component extraArgs
    template: compactor/deployment-compactor.yaml
    set:
      global.extraArgs:
        - -config.expand-env=true
      compactor.extraArgs:
        - -log.level=debug
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -config.expand-env=true
      - contains:
          path: spec.template.spec.containers[0].args
          content: -log.level=debug

  - it: autoscaling disabled uses static replicas
    template: compactor/deployment-compactor.yaml
    set:
      compactor.autoscaling.enabled: false
      compactor.replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: autoscaling enabled omits replicas from spec
    template: compactor/deployment-compactor.yaml
    set:
      compactor.autoscaling.enabled: true
    asserts:
      - notExists:
          path: spec.replicas

  - it: volumes include config, runtime-config and compactor store
    template: compactor/deployment-compactor.yaml
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            configMap:
              name: RELEASE-NAME-tempo-config
              items:
                - key: "tempo.yaml"
                  path: "tempo.yaml"
      - contains:
          path: spec.template.spec.volumes
          content:
            name: runtime-config
            configMap:
              name: RELEASE-NAME-tempo-runtime
              items:
                - key: "overrides.yaml"
                  path: "overrides.yaml"
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tempo-compactor-store
            emptyDir: {}

  - it: dnsConfigOverides disabled by default - no dnsConfig rendered
    template: compactor/deployment-compactor.yaml
    asserts:
      - notExists:
          path: spec.template.spec.dnsConfig

  - it: dnsConfigOverides.enabled=true renders dnsConfig from default body
    template: compactor/deployment-compactor.yaml
    set:
      compactor.dnsConfigOverides.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.dnsConfig
          value:
            options:
              - name: ndots
                value: "3"

  - it: dnsConfigOverides.enabled=true with custom dnsConfig body
    template: compactor/deployment-compactor.yaml
    set:
      compactor.dnsConfigOverides.enabled: true
      compactor.dnsConfigOverides.dnsConfig:
        nameservers:
          - 8.8.8.8
        options:
          - name: ndots
            value: "1"
    asserts:
      - equal:
          path: spec.template.spec.dnsConfig
          value:
            nameservers:
              - 8.8.8.8
            options:
              - name: ndots
                value: "1"

  - it: dnsConfigOverides.enabled=false renders no dnsConfig even with body set
    template: compactor/deployment-compactor.yaml
    set:
      compactor.dnsConfigOverides.enabled: false
      compactor.dnsConfigOverides.dnsConfig:
        options:
          - name: ndots
            value: "3"
    asserts:
      - notExists:
          path: spec.template.spec.dnsConfig

  - it: should not render when backendScheduler is enabled
    template: compactor/deployment-compactor.yaml
    set:
      backendScheduler.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: renders memberlist label on Deployment metadata
    template: compactor/deployment-compactor.yaml
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/part-of"]
          value: memberlist

  - it: renders minReadySeconds from compactor.minReadySeconds
    template: compactor/deployment-compactor.yaml
    set:
      compactor.minReadySeconds: 20
    asserts:
      - equal:
          path: spec.minReadySeconds
          value: 20

  - it: renders revisionHistoryLimit from tempo.revisionHistoryLimit
    template: compactor/deployment-compactor.yaml
    set:
      tempo.revisionHistoryLimit: 5
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 5

  - it: renders strategy from compactor.strategy
    template: compactor/deployment-compactor.yaml
    set:
      compactor.strategy:
        rollingUpdate:
          maxSurge: 1
          maxUnavailable: 0
    asserts:
      - equal:
          path: spec.strategy.rollingUpdate.maxSurge
          value: 1
      - equal:
          path: spec.strategy.rollingUpdate.maxUnavailable
          value: 0

  - it: renders Deployment annotations from compactor.annotations
    template: compactor/deployment-compactor.yaml
    set:
      compactor.annotations:
        custom-annotation: value
    asserts:
      - equal:
          path: metadata.annotations["custom-annotation"]
          value: value
