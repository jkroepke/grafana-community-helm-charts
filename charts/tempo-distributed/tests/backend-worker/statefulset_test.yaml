# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: backend-worker StatefulSet
templates:
  - backend-worker/statefulset-backend-worker.yaml
  - configmap-tempo.yaml

tests:
  - it: renders a StatefulSet with correct name and kind
    template: backend-worker/statefulset-backend-worker.yaml
    set:
      backendScheduler.enabled: true
    asserts:
      - equal:
          path: kind
          value: StatefulSet
      - equal:
          path: metadata.name
          value: RELEASE-NAME-tempo-backend-worker

  - it: renders standard ports on the backend-worker container
    template: backend-worker/statefulset-backend-worker.yaml
    set:
      backendScheduler.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 3200
            name: http-metrics
            protocol: TCP

  - it: does not render trace ports (backend-worker has no trace ingestion)
    template: backend-worker/statefulset-backend-worker.yaml
    set:
      backendScheduler.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports
          value:
            - containerPort: 7946
              name: http-memberlist
              protocol: TCP
            - containerPort: 3200
              name: http-metrics
              protocol: TCP

  - it: uses tempo.podSecurityContext when no component override is set
    template: backend-worker/statefulset-backend-worker.yaml
    set:
      backendScheduler.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1000

  - it: global.priorityClassName is used when no component override
    template: backend-worker/statefulset-backend-worker.yaml
    set:
      backendScheduler.enabled: true
      global.priorityClassName: high-priority
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: high-priority

  - it: global.extraArgs are prepended to component extraArgs
    template: backend-worker/statefulset-backend-worker.yaml
    set:
      backendScheduler.enabled: true
      global.extraArgs:
        - -config.expand-env=true
      backendWorker.extraArgs:
        - -log.level=debug
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -config.expand-env=true
      - contains:
          path: spec.template.spec.containers[0].args
          content: -log.level=debug

  - it: autoscaling disabled uses static replicas
    template: backend-worker/statefulset-backend-worker.yaml
    set:
      backendScheduler.enabled: true
      backendWorker.autoscaling.enabled: false
      backendWorker.replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: autoscaling enabled omits replicas from spec
    template: backend-worker/statefulset-backend-worker.yaml
    set:
      backendScheduler.enabled: true
      backendWorker.autoscaling.enabled: true
    asserts:
      - notExists:
          path: spec.replicas

  - it: volumes include config, runtime-config and backend-worker store
    template: backend-worker/statefulset-backend-worker.yaml
    set:
      backendScheduler.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            configMap:
              name: RELEASE-NAME-tempo-config
              items:
                - key: "tempo.yaml"
                  path: "tempo.yaml"
      - contains:
          path: spec.template.spec.volumes
          content:
            name: runtime-config
            configMap:
              name: RELEASE-NAME-tempo-runtime
              items:
                - key: "overrides.yaml"
                  path: "overrides.yaml"
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tempo-backend-worker-store
            emptyDir: {}
